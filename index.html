<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11131a">
  <meta name="description" content="Generate, solve, play, and export seeded mazes in your browser.">
  <title>Maze Lab Deluxe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">GENERATE · PLAY · EXPORT</p>
      <h1>Maze Lab <span>Deluxe</span></h1>
    </div>
    <div class="header-actions">
      <button id="randomSeed" class="button ghost" type="button">Surprise me</button>
      <button id="generateTop" class="button primary" type="button">Generate maze</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="controls" aria-label="Maze controls">
      <details open>
        <summary>Maze generation</summary>
        <div class="section-body">
          <label class="field full">
            <span>Algorithm and typical difficulty</span>
            <select id="algorithm">
              <option value="binary">Binary Tree (Very Easy)</option>
              <option value="sidewinder">Sidewinder (Easy)</option>
              <option value="backtracker" selected>Recursive Backtracker (Medium)</option>
              <option value="growing">Growing Tree (Medium–Hard)</option>
              <option value="prim">Randomized Prim (Hard)</option>
              <option value="kruskal">Randomized Kruskal (Hard)</option>
              <option value="wilson">Wilson (Very Hard)</option>
              <option value="aldous">Aldous–Broder (Very Hard)</option>
            </select>
          </label>

          <div class="field-grid">
            <label class="field"><span>Width</span><input id="mazeWidth" type="number" min="2" max="300" value="25"></label>
            <label class="field"><span>Height</span><input id="mazeHeight" type="number" min="2" max="300" value="25"></label>
          </div>

          <label class="field full">
            <span>Seed</span>
            <div class="inline-control">
              <input id="seed" type="text" value="12345" maxlength="80" spellcheck="false">
              <button id="seedDice" class="icon-button" type="button" title="Random seed" aria-label="Random seed">↻</button>
            </div>
          </label>

          <label class="field full range-field">
            <span><span>Complexity / corridor bias</span><output id="complexityOut">75%</output></span>
            <input id="complexity" type="range" min="0" max="1" step="0.01" value="0.75">
          </label>
          <label class="field full range-field">
            <span><span>Braiding / extra loops</span><output id="braidOut">0%</output></span>
            <input id="braid" type="range" min="0" max="1" step="0.01" value="0">
          </label>

          <div class="field-grid">
            <label class="field"><span>Start</span><select id="startCorner"></select></label>
            <label class="field"><span>Exit</span><select id="exitCorner"></select></label>
          </div>
        </div>
      </details>

      <details open>
        <summary>Rendering & colors</summary>
        <div class="section-body">
          <div class="field-grid">
            <label class="field"><span>Export cell px</span><input id="cellSize" type="number" min="4" max="100" value="24"></label>
            <label class="field"><span>Wall px</span><input id="wallWidth" type="number" min="1" max="20" value="3"></label>
          </div>
          <div id="paletteControls" class="palette-controls"></div>
        </div>
      </details>

      <details open>
        <summary>Player & overlays</summary>
        <div class="section-body compact">
          <label class="switch-row"><span>Player mode</span><input id="playerMode" type="checkbox"><i></i></label>
          <label class="switch-row"><span>Movement trail</span><input id="showTrail" type="checkbox" checked><i></i></label>
          <label class="switch-row"><span>Solution overlay</span><input id="showSolution" type="checkbox"><i></i></label>
          <button id="resetPlayer" class="button secondary full-button" type="button">Reset player</button>
        </div>
      </details>

      <details open>
        <summary>Save / export</summary>
        <div class="section-body">
          <label class="field full"><span>File extension</span>
            <select id="format">
              <option value="png">PNG — lossless (.png)</option>
              <option value="jpeg">JPEG — compressed (.jpg)</option>
              <option value="bmp">BMP — uncompressed (.bmp)</option>
              <option value="gif">GIF — still or animated (.gif)</option>
            </select>
          </label>
          <div id="gifOptions" class="field-grid is-hidden">
            <label class="field"><span>GIF frames</span><input id="gifFrames" type="number" min="8" max="180" value="36"></label>
            <label class="field"><span>Frame ms</span><input id="gifSpeed" type="number" min="20" max="500" value="55"></label>
          </div>
          <button id="download" class="button export full-button" type="button">Download PNG</button>
          <p class="hint">Animated palettes move in the preview. GIF preserves the animation; other formats save the visible frame.</p>
        </div>
      </details>
    </aside>

    <section class="workspace" aria-label="Maze viewer">
      <div class="viewer-toolbar">
        <div id="status" class="status" aria-live="polite">Generating maze…</div>
        <button id="solutionQuick" class="chip" type="button" aria-pressed="false">Show solution</button>
      </div>
      <div id="canvasStage" class="canvas-stage" tabindex="0" aria-label="Maze. Enable player mode and use arrow keys or WASD to move.">
        <canvas id="mazeCanvas"></canvas>
        <div id="completion" class="completion" role="status" hidden>
          <strong>Maze complete!</strong>
          <span id="completionText"></span>
          <button id="playAgain" type="button">Play again</button>
        </div>
      </div>
      <div class="playbar">
        <span>Click the maze, then use arrows or WASD.</span>
        <div class="dpad" aria-label="Touch movement controls">
          <button data-dir="N" aria-label="Move up">↑</button>
          <button data-dir="W" aria-label="Move left">←</button>
          <button data-dir="S" aria-label="Move down">↓</button>
          <button data-dir="E" aria-label="Move right">→</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
